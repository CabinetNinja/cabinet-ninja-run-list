<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#214f4b" />
    <title>Run List | Cabinet Ninja</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <button class="icon-button back-button" id="backButton" type="button" aria-label="Back">&lsaquo;</button>
        <div>
          <p class="brand">Cabinet Ninja</p>
          <h1 id="screenTitle">Run List</h1>
        </div>
        <button class="primary-action" id="quickAddButton" type="button">Add</button>
      </header>

      <main id="app" tabindex="-1"></main>

      <nav class="bottom-nav" aria-label="Main navigation">
        <a href="#/" data-route="home"><span class="nav-icon" aria-hidden="true">&#8962;</span><span>Home</span></a>
        <a href="#/suppliers" data-route="suppliers"><span class="nav-icon" aria-hidden="true">&#9776;</span><span>Run List</span></a>
        <a href="#/leads" data-route="leads"><span class="nav-icon" aria-hidden="true">&#9787;</span><span>Leads</span></a>
        <a href="#/orders" data-route="orders"><span class="nav-icon" aria-hidden="true">&#9638;</span><span>Orders</span></a>
        <a href="#/jobs" data-route="jobs"><span class="nav-icon" aria-hidden="true">&#9636;</span><span>Jobs</span></a>
        <a class="desktop-nav-only" href="#/workshop" data-route="workshop"><span class="nav-icon" aria-hidden="true">&#9881;</span><span>Workshop</span></a>
        <a class="desktop-nav-only" href="#/history" data-route="history"><span class="nav-icon" aria-hidden="true">&#9687;</span><span>History</span></a>
      </nav>
    </div>

    <template id="itemCardTemplate">
      <article class="item-row">
        <button class="tick-button" type="button" aria-label="Mark complete"></button>
        <div class="item-main">
          <div class="item-title-line">
            <h3></h3>
            <span class="priority-pill"></span>
          </div>
          <p class="item-meta"></p>
          <p class="item-notes"></p>
          <div class="item-controls">
            <select aria-label="Item status"></select>
            <button class="ghost-button edit-item" type="button">Edit</button>
          </div>
        </div>
      </article>
    </template>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="run-list-config.js"></script>
    <script src="app.js"></script>
  </body>
</html>
